services:
  backend:
    build: ./server
    expose:
      - "5000"
    volumes:
      - ./server:/app
      - /app/.venv
      - uploads:/app/uploads
    env_file: .env
    restart: unless-stopped

  frontend:
    build: ./client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
